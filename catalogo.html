<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo de Eletrônicos — Gabriel Pires</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --c1: #FF3CAC;
    --c2: #784BA0;
    --c3: #2B86C5;
    --c4: #F9A825;
    --c5: #00E5FF;
    --bg: #0a0a0f;
    --card: #13131f;
    --border: rgba(255,255,255,0.07);
    --text: #f0f0f0;
    --sub: #aaa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background mesh */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(255,60,172,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(43,134,197,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(120,75,160,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: relative;
    z-index: 10;
    padding: 60px 40px 40px;
    text-align: center;
  }

  .badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--c1), var(--c2));
    color: white;
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 6px 18px;
    border-radius: 50px;
    margin-bottom: 20px;
    animation: fadeDown 0.6s ease both;
  }

  h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(2rem, 6vw, 4rem);
    font-weight: 900;
    line-height: 1.1;
    animation: fadeDown 0.7s ease both;
    background: linear-gradient(135deg, #fff 30%, var(--c5) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    margin-top: 14px;
    font-size: 1rem;
    color: var(--sub);
    animation: fadeDown 0.8s ease both;
    max-width: 500px;
    margin-inline: auto;
  }

  /* DIVIDER */
  .divider {
    width: 80px;
    height: 3px;
    background: linear-gradient(90deg, var(--c1), var(--c3));
    margin: 30px auto;
    border-radius: 2px;
    animation: fadeDown 0.9s ease both;
  }

  /* FILTER TABS */
  .filters {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    padding: 0 20px 40px;
    position: relative;
    z-index: 10;
    animation: fadeDown 1s ease both;
  }

  .filter-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--sub);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    padding: 8px 20px;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.25s;
  }

  .filter-btn:hover,
  .filter-btn.active {
    background: linear-gradient(135deg, var(--c1), var(--c2));
    border-color: transparent;
    color: white;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
    padding: 0 40px 80px;
    max-width: 1300px;
    margin: 0 auto;
    position: relative;
    z-index: 10;
  }

  /* CARD */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
    animation: fadeUp 0.6s ease both;
    cursor: pointer;
  }

  .card:hover {
    transform: translateY(-8px);
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    border-color: rgba(255,60,172,0.3);
  }

  .card-img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
    background: #1a1a2e;
  }

  .card-img-placeholder {
    width: 100%;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 4rem;
    position: relative;
    overflow: hidden;
  }

  .card-body {
    padding: 20px;
  }

  .card-category {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .card-name {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 10px;
    color: #fff;
  }

  .card-desc {
    font-size: 0.82rem;
    color: var(--sub);
    line-height: 1.6;
    margin-bottom: 18px;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .price {
    font-family: 'Unbounded', sans-serif;
    font-size: 1.2rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--c4), var(--c1));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* TAG de condição */
  .tag {
    font-size: 0.68rem;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 50px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .tag-novo { background: rgba(0,229,255,0.12); color: var(--c5); border: 1px solid rgba(0,229,255,0.3); }
  .tag-usado { background: rgba(249,168,37,0.12); color: var(--c4); border: 1px solid rgba(249,168,37,0.3); }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 30px;
    color: var(--sub);
    font-size: 0.8rem;
    border-top: 1px solid var(--border);
    position: relative;
    z-index: 10;
  }

  footer span {
    background: linear-gradient(135deg, var(--c1), var(--c3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 700;
  }

  /* ANIMATIONS */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* EMPTY STATE */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px;
    color: var(--sub);
    font-size: 0.9rem;
  }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    header { padding: 40px 20px 30px; }
    .grid { padding: 0 20px 60px; gap: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="badge">✦ Catálogo Oficial ✦</div>
  <h1>Eletrônicos<br>& Tech</h1>
  <p class="subtitle">Produtos selecionados com qualidade garantida. Consulte disponibilidade e condições.</p>
  <div class="divider"></div>
</header>

<div class="filters">
  <button class="filter-btn active" onclick="filtrar('todos')">Todos</button>
  <button class="filter-btn" onclick="filtrar('smartphone')">Smartphones</button>
  <button class="filter-btn" onclick="filtrar('notebook')">Notebooks</button>
  <button class="filter-btn" onclick="filtrar('periferico')">Periféricos</button>
  <button class="filter-btn" onclick="filtrar('componente')">Componentes</button>
</div>

<div class="grid" id="grid"></div>

<footer>
  Catálogo criado por <span>Gabriel Pires</span> — Atualizado em 2025
</footer>

const categoriaLabel = {
  smartphone: "Smartphone",
  notebook: "Notebook",
  periferico: "Periférico",
  componente: "Componente PC"
};

const categoriaColor = {
  smartphone: "#FF3CAC",
  notebook: "#00E5FF",
  periferico: "#784BA0",
  componente: "#F9A825"
};

function renderizar(lista) {
  const grid = document.getElementById('grid');
  if (lista.length === 0) {
    grid.innerHTML = '<div class="empty">Nenhum produto encontrado nessa categoria.</div>';
    return;
  }
  grid.innerHTML = lista.map((p, i) => `
    <div class="card" style="animation-delay: ${i * 0.07}s">
      <div class="card-img-placeholder" style="background: ${p.cor}">
        <span style="font-size: 4.5rem; filter: drop-shadow(0 4px 20px rgba(0,0,0,0.5))">${p.emoji}</span>
      </div>
      <div class="card-body">
        <div class="card-category" style="color: ${categoriaColor[p.categoria]}">${categoriaLabel[p.categoria]}</div>
        <div class="card-name">${p.nome}</div>
        <div class="card-desc">${p.descricao}</div>
        <div class="card-footer">
          <div class="price">${p.preco}</div>
          <span class="tag tag-${p.condicao}">${p.condicao === 'novo' ? '✦ Novo' : '↻ Usado'}</span>
        </div>
      </div>
    </div>
  `).join('');
}

function filtrar(cat) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const lista = cat === 'todos' ? produtos : produtos.filter(p => p.categoria === cat);
  renderizar(lista);
}

renderizar(produtos);
</script>
</body>
</html>
